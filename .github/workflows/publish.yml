name: Publish to npm (token auth)

# Falling back from OIDC trusted-publisher to classic NPM_TOKEN auth.
# Reason: trusted-publisher config on npmjs.com for this package keeps
# binding to the wrong repo (lorecraft-io/morgen-mcp) regardless of UI
# edits — npm backend issue, not a workflow problem. Morgen + fidgetflo
# publish via OIDC fine; motion uses token until the TP config untangles.
# Task tracked for 2026-06-15.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Pack and inspect without publishing'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
        if: hashFiles('test/**', 'tests/**', 'src/**/*.test.*') != ''
      - name: Publish (dry run)
        if: ${{ inputs.dry-run }}
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
